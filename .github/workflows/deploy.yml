name: Deploy handbook to share.co3.io

# Publishes the static handbook to the share.co3.io project on every push to
# main. Runs scripts/share-deploy.sh, which uploads all site files and then
# prunes stale remote files (a clean mirror) — the URL stays stable and
# structural changes / renames leave no leftovers.
#
# Setup: add two repository SECRETS (Settings ▸ Secrets and variables ▸ Actions
#   ▸ Secrets ▸ New repository secret):
#     SHARE_API_KEY     — the write key
#     SHARE_PROJECT_ID  — the target share.co3.io project id

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "styles.css"
      - "app.js"
      - "assets/**"
      - "scripts/share-deploy.sh"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: share-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Prefer a Secret (masked). vars.* is a fallback only — don't store the
      # key as a plaintext variable; it has write + delete privileges.
      SHARE_API_KEY: ${{ secrets.SHARE_API_KEY || vars.SHARE_API_KEY }}
      # Target project id — now stored as a repo secret (its value changed and
      # is no longer hardcoded here).
      SHARE_PROJECT_ID: ${{ secrets.SHARE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Publish to share.co3.io
        if: ${{ env.SHARE_API_KEY != '' && env.SHARE_PROJECT_ID != '' }}
        run: |
          chmod +x scripts/share-deploy.sh
          scripts/share-deploy.sh .

      - name: Missing secrets — skip
        if: ${{ env.SHARE_API_KEY == '' || env.SHARE_PROJECT_ID == '' }}
        run: |
          echo "::warning::SHARE_API_KEY and/or SHARE_PROJECT_ID secret is not set — deploy skipped. Add both under Settings ▸ Secrets and variables ▸ Actions ▸ Secrets, then re-run this workflow."
