name: Deploy handbook to share.co3.io

# Publishes the static handbook to the share.co3.io project on every push to
# main. Uploads to the project ROOT (in place) via scripts/share-deploy.sh, so
# the URL is stable and each run overwrites the previous files.
#
# Setup: add a repository SECRET named SHARE_API_KEY
#   (Settings ▸ Secrets and variables ▸ Actions ▸ Secrets ▸ New repository secret).
# The target project id lives in SHARE_PROJECT below; override it with a repo
# VARIABLE of the same name if the project ever changes.

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "styles.css"
      - "app.js"
      - "assets/**"
      - "scripts/share-deploy.sh"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: share-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Prefer a Secret (masked). vars.* is a fallback only — don't store the
      # key as a plaintext variable; it has write + delete privileges.
      SHARE_API_KEY: ${{ secrets.SHARE_API_KEY || vars.SHARE_API_KEY }}
      SHARE_PROJECT: ${{ vars.SHARE_PROJECT || '01KWE6PKH5CFSYJR5DMYZBK7P5' }}
    steps:
      - uses: actions/checkout@v4

      - name: Publish to share.co3.io
        if: ${{ env.SHARE_API_KEY != '' }}
        run: |
          chmod +x scripts/share-deploy.sh
          scripts/share-deploy.sh .

      - name: No API key — skip
        if: ${{ env.SHARE_API_KEY == '' }}
        run: |
          echo "::warning::SHARE_API_KEY is not set. Add it under Settings ▸ Secrets and variables ▸ Actions ▸ Secrets, then re-run this workflow."
